<!-- ── TWEAKS ENGINE (inline so it's synchronous) ────────── -->
<script type="text/babel">
function useTweaks(defaults) {
  const [v, setV] = React.useState(defaults);
  const set = React.useCallback((k, val) => {
    const edits = typeof k === 'string' ? {[k]: val} : k;
    setV(p => ({...p, ...edits}));
    try { window.parent.postMessage({type:'__edit_mode_set_keys', edits}, '*'); } catch(e){}
  }, []);
  return [v, set];
}

function TweaksPanel({children}) {
  const [open, setOpen] = React.useState(false);
  React.useEffect(() => {
    const fn = e => {
      if(e.data?.type==='__activate_edit_mode') setOpen(true);
      if(e.data?.type==='__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', fn);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', fn);
  }, []);
  if(!open) return null;
  return (
    <div style={{position:'fixed',right:16,bottom:16,zIndex:9999,width:264,background:'rgba(250,249,247,.93)',backdropFilter:'blur(22px)',borderRadius:13,boxShadow:'0 8px 36px rgba(0,0,0,.22)',border:'.5px solid rgba(255,255,255,.65)',overflow:'hidden',animation:'fadeUp .18s ease'}}>
      <div style={{padding:'10px 14px',borderBottom:'1px solid rgba(0,0,0,.07)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <b style={{fontSize:12,letterSpacing:'.01em'}}>Tweaks</b>
        <button onClick={()=>{setOpen(false);window.parent.postMessage({type:'__edit_mode_dismissed'},'*');}} style={{background:'none',border:'none',fontSize:18,cursor:'pointer',color:'#999',lineHeight:1}}>×</button>
      </div>
      <div style={{padding:'6px 0',maxHeight:'65vh',overflow:'auto'}}>{children}</div>
    </div>
  );
}
function TweakSection({label}){
  return <div style={{padding:'10px 14px 4px',fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.09em',color:'#aaa'}}>{label}</div>;
}
function TweakRadio({label,value,options,onChange}){
  return(
    <div style={{padding:'3px 14px 9px'}}>
      {label&&<div style={{fontSize:11,color:'#777',marginBottom:5}}>{label}</div>}
      <div style={{display:'flex',background:'rgba(0,0,0,.07)',borderRadius:8,padding:2,gap:1}}>
        {options.map(o=>(
          <button key={o} onClick={()=>onChange(o)} style={{flex:1,padding:'5px 6px',borderRadius:6,border:'none',background:value===o?'white':'transparent',color:value===o?'#1a1a1a':'#888',fontSize:11.5,fontWeight:value===o?600:400,cursor:'pointer',transition:'all .12s',boxShadow:value===o?'0 1px 4px rgba(0,0,0,.11)':'none'}}>{o}</button>
        ))}
      </div>
    </div>
  );
}
function TweakToggle({label,value,onChange}){
  const acc=value?'var(--acc)':'rgba(0,0,0,.15)';
  return(
    <div style={{padding:'4px 14px 9px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <span style={{fontSize:12,color:'#555'}}>{label}</span>
      <div onClick={()=>onChange(!value)} style={{width:36,height:21,borderRadius:11,background:acc,cursor:'pointer',position:'relative',transition:'background .2s',flexShrink:0}}>
        <div style={{position:'absolute',top:2.5,left:value?15:2.5,width:16,height:16,borderRadius:'50%',background:'white',transition:'left .2s',boxShadow:'0 1px 4px rgba(0,0,0,.22)'}}/>
      </div>
    </div>
  );
}
function TweakColor({label,value,options,onChange}){
  return(
    <div style={{padding:'3px 14px 9px'}}>
      {label&&<div style={{fontSize:11,color:'#777',marginBottom:6}}>{label}</div>}
      <div style={{display:'flex',gap:7}}>
        {options.map(o=>(
          <div key={o} onClick={()=>onChange(o)} title={o}
            style={{width:30,height:30,borderRadius:7,background:o,cursor:'pointer',outline:value===o?`2.5px solid #333`:'2.5px solid transparent',outlineOffset:2,transition:'outline .12s',boxShadow:'0 2px 6px rgba(0,0,0,.15)'}}/>
        ))}
      </div>
    </div>
  );
}
Object.assign(window, {useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle, TweakColor});
</script>

const AISuggestion = ({contact, acc, onLog}) => {
  const [state, setState] = useState('idle');
  const [suggestion, setSuggestion] = useState(null);
  const [copied, setCopied] = useState(false);
  const generate = async () => {
    setState('loading');
    const last = contact.interactions[0];
    try {
      const resp = await window.claude.complete(
        `You help maintain personal relationships. Suggest a brief follow-up for this contact.\n\nName: ${contact.name} (${contact.role}${contact.company?` at ${contact.company}`:''})
Last interaction (${last?relTime(last.date):'unknown'}): ${last?.note||'No recent interaction'}\nNotes: ${contact.notes||'None'}\n\nReply with ONLY valid JSON (no markdown): {"action":"one-line suggested action","message":"2-3 sentence warm casual message to send"}`
      );
      const json = JSON.parse(resp.replace(/```json|```/g,'').trim());
      setSuggestion(json); setState('done');
    } catch(e) {
      setSuggestion({action:`Check in with ${contact.name.split(' ')[0]}`,message:`Hey ${contact.name.split(' ')[0]}! It's been a while — hope everything's going well. Would love to catch up soon!`});
      setState('done');
    }
  };
  const copy = () => { navigator.clipboard.writeText(suggestion.message); setCopied(true); setTimeout(()=>setCopied(false),2000); };

      <span style={{fontSize:12.5,color:'var(--ink-light)'}}>Generate AI follow-up suggestion</span>
    </div>
  );
  if(state==='loading') return(
    <div style={{padding:'12px 14px',borderRadius:9,background:`${acc}0A`,border:`1.5px solid ${acc}33`,marginTop:12,display:'flex',alignItems:'center',gap:8}}>
      <span style={{fontSize:12,color:acc,fontWeight:700}}>✶</span>
      <span style={{fontSize:12,color:'var(--ink-light)'}}>Thinking…</span>
    </div>
  );
  return(
    <div style={{padding:'13px 15px',borderRadius:9,background:`${acc}0A`,border:`1.5px solid ${acc}33`,marginTop:12}}>
      <div style={{fontSize:10,fontWeight:700,letterSpacing:'.09em',textTransform:'uppercase',color:acc,marginBottom:7}}>✶ AI Suggestion</div>
      <div style={{fontSize:13,fontWeight:600,color:'var(--ink)',marginBottom:8}}>→ {suggestion.action}</div>
      <div style={{fontSize:12.5,color:'var(--ink-mid)',lineHeight:1.65,fontStyle:'italic',marginBottom:10}}>“{suggestion.message}”</div>
      <div style={{display:'flex',gap:7}}>
        <button onClick={copy} style={{flex:1,padding:'6px 0',borderRadius:7,border:`1.5px solid ${acc}44`,background:'white',color:acc,fontSize:12,fontWeight:600,cursor:'pointer'}}>{copied?'✓ Copied':'Copy message'}</button>
        <button onClick={logIt} style={{flex:1,padding:'6px 0',borderRadius:7,border:'none',background:acc,color:'white',fontSize:12,fontWeight:600,cursor:'pointer'}}>✓ I reached out</button>

    </div>
  );
};

};

const BirthdayBadge = ({contact}) => {
  const days = birthdayDaysAway(contact.birthday);
  if(days===null||days>14) return null;
  return(
    <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600,background:'#FDF0FB',color:'#9B3F8A',border:'1px solid #E8C4E0',whiteSpace:'nowrap'}}>
      🎂 {days===0?'Today!':days===1?'Tomorrow':`in ${days}d`}
    </span>
  );
};

const DueBadge = ({contact}) => {
  if(!contact.nextFollowUp) return null;
  const days = Math.floor((new Date(contact.nextFollowUp)-TODAY)/(864e5));
  if(days>3) return null;
  return(
    <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 8px',borderRadius:20,fontSize:11,fontWeight:600,background:days<0?'#FDECEA':days===0?'#FBF0EB':'#FDF6E3',color:days<0?'#C44F3A':days===0?'#D97757':'#C49B3A',border:`1px solid ${days<0?'#FFCDD2':days===0?'#F2C4AE':'#F0DFA0'}`,whiteSpace:'nowrap'}}>
      {days<0?'⚡':days===0?'⏰':'🔔'} {relFuture(contact.nextFollowUp)}
    </span>
  );
};

/* ── SETUP BANNER ─── */
const SETUP_SQL = `-- Run once in your Supabase SQL Editor:
create table contacts (
  id uuid primary key default gen_random_uuid(),
  name text not null, role text, company text,
  email text, phone text, tags text[] default '{}',
  last_contact date, next_follow_up date,
  strength float default 0.5,
  notes text, social jsonb default '{}',
  created_at timestamptz default now()
);
create table interactions (
  id uuid primary key default gen_random_uuid(),
  contact_id uuid references contacts(id) on delete cascade,
  date date not null, type text not null, note text,
  created_at timestamptz default now()
);
alter table contacts enable row level security;
alter table interactions enable row level security;
create policy "anon_all" on contacts for all using (true) with check (true);
create policy "anon_all" on interactions for all using (true) with check (true);`;

const SetupBanner = ({acc, onDismiss}) => {
  const [copied, setCopied] = useState(false);
  const copy = () => { navigator.clipboard.writeText(SETUP_SQL); setCopied(true); setTimeout(()=>setCopied(false),2000); };
  return(
    <div style={{margin:'16px 22px 0',padding:'14px 16px',background:'#FDF6E3',border:'1.5px solid #F0DFA0',borderRadius:10,flexShrink:0}}>
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:8}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:'#7A5A00',marginBottom:2}}>🛠 Supabase tables not found</div>
          <div style={{fontSize:12,color:'#8B6A10',lineHeight:1.5}}>Run the SQL below in your <b>Supabase SQL Editor</b>, then refresh.</div>
        </div>
        <button onClick={onDismiss} style={{border:'none',background:'none',color:'#C49B3A',fontSize:18,cursor:'pointer',lineHeight:1,padding:0,flexShrink:0}}>×</button>
      </div>
      <div style={{position:'relative'}}>
        <pre style={{background:'#29261B',color:'#E8DFA0',borderRadius:7,padding:'10px 12px',fontSize:10.5,lineHeight:1.6,overflow:'auto',maxHeight:140,fontFamily:'monospace',margin:0}}>{SETUP_SQL}</pre>
        <button onClick={copy} style={{position:'absolute',top:6,right:6,padding:'4px 10px',borderRadius:6,border:'none',background:copied?'#5A8A6A':acc,color:'white',fontSize:11,fontWeight:600,cursor:'pointer',transition:'background .2s'}}>{copied?'✓ Copied':'Copy SQL'}</button>
      </div>
    </div>
  );
};

            <div style={{fontSize:32,marginBottom:12}}>🌿</div>
            <div style={{fontFamily:"'Lora',serif",fontSize:16,marginBottom:4}}>No contacts found</div>
            <div style={{fontSize:13}}>Try a different search</div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ── ACTIVITY RIVER VIEW ─── */
const RiverView = ({contacts, onSelect, acc}) => {
  const events = useMemo(()=>
    contacts.flatMap(c=>c.interactions.map(i=>({...i,contact:c})))
      .sort((a,b)=>new Date(b.date)-new Date(a.date))
  ,[contacts]);
  return(
    <div style={{flex:1,overflow:'auto',padding:'24px 32px'}}>
      <div style={{maxWidth:620,margin:'0 auto'}}>
        <div style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:700,marginBottom:3}}>Activity River</div>
        <div style={{fontSize:13,color:'var(--ink-light)',marginBottom:26}}>Every interaction, flowing through time</div>
        {events.map((ev,i)=>(
          <div key={i} style={{display:'flex',gap:14}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',width:34,flexShrink:0}}>
              <div style={{width:34,height:34,borderRadius:'50%',background:'white',border:'2px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0}}>{iIcon(ev.type)}</div>
              {i<events.length-1 && <div style={{width:1.5,flex:1,background:'var(--border)',minHeight:12,margin:'3px 0'}}/>}
            </div>
            <div style={{flex:1,paddingBottom:i<events.length-1?18:0}}>
              <div onClick={()=>onSelect(ev.contact)}
                style={{background:'var(--card)',borderRadius:10,padding:'11px 15px',cursor:'pointer',border:'1.5px solid transparent',transition:'all .14s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=acc;e.currentTarget.style.background='white';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='transparent';e.currentTarget.style.background='var(--card)';}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:5}}>
                  <Avi contact={ev.contact} size={22} ring={false}/>
                  <span style={{fontWeight:600,fontSize:13}}>{ev.contact.name}</span>
                  <span style={{fontSize:11,color:'var(--ink-faint)'}}>·</span>
                  <span style={{fontSize:11,color:'var(--ink-light)'}}>{relTime(ev.date)}</span>
                </div>
                <div style={{fontSize:13,color:'var(--ink-mid)',lineHeight:1.55}}>{ev.note}</div>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ── REMINDERS VIEW ─── */
const RemindersView = ({contacts, onSelect, onLog, acc}) => {
  const sorted = [...contacts].filter(c=>c.nextFollowUp).sort((a,b)=>new Date(a.nextFollowUp)-new Date(b.nextFollowUp));
  const over = sorted.filter(c=>Math.floor((new Date(c.nextFollowUp)-TODAY)/(864e5))<0);
  const coming = sorted.filter(c=>Math.floor((new Date(c.nextFollowUp)-TODAY)/(864e5))>=0);
  const quickLog = (e,cid) => { e.stopPropagation(); onLog(cid,{type:'message',note:'Quick check-in'}); };
  const Sec = ({title,items,badge}) => items.length===0?null:(
    <div style={{marginBottom:26}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <div style={{fontFamily:"'Lora',serif",fontSize:17,fontWeight:600}}>{title}</div>
        {badge && <span style={{fontSize:11,fontWeight:700,background:badge.bg,color:badge.color,borderRadius:10,padding:'2px 8px'}}>{badge.label}</span>}
      </div>
      {items.map(c=>(
        <div key={c.id} onClick={()=>onSelect(c)}
          style={{display:'flex',alignItems:'center',gap:12,padding:'12px 14px',background:'var(--card)',borderRadius:10,marginBottom:7,cursor:'pointer',border:'1.5px solid transparent',transition:'all .14s'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=acc;e.currentTarget.style.background='white';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='transparent';e.currentTarget.style.background='var(--card)';}}>
          <Avi contact={c} size={40}/>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:14}}>{c.name}</div>
            <div style={{fontSize:12,color:'var(--ink-light)'}}>{c.role}{c.company?` · ${c.company}`:''}</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
            <DueBadge contact={c}/>
            <button onClick={e=>quickLog(e,c.id)} style={{padding:'5px 11px',borderRadius:7,border:'1.5px solid var(--border)',background:'var(--paper)',color:'var(--ink-mid)',fontSize:11.5,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap',transition:'all .14s'}}
              onMouseEnter={e=>{e.currentTarget.style.background=acc;e.currentTarget.style.color='white';e.currentTarget.style.borderColor=acc;}}
              onMouseLeave={e=>{e.currentTarget.style.background='var(--paper)';e.currentTarget.style.color='var(--ink-mid)';e.currentTarget.style.borderColor='var(--border)';}}>✓ Done</button>
          </div>
        </div>
      ))}
    </div>
  );
  return(
    <div style={{flex:1,overflow:'auto',padding:'24px 32px'}}>
      <div style={{maxWidth:580,margin:'0 auto'}}>
        <div style={{fontFamily:"'Lora',serif",fontSize:22,fontWeight:700,marginBottom:3}}>Follow-ups</div>
        <div style={{fontSize:13,color:'var(--ink-light)',marginBottom:26}}>Stay warm with the people who matter</div>
        <Sec title="Overdue" items={over} badge={over.length?{bg:'#FDECEA',color:'#C44F3A',label:`${over.length} overdue`}:null}/>
        <Sec title="Upcoming" items={coming}/>
      </div>
    </div>
  );
};


/* ── SPEED DIAL FAB ─── */
const SpeedDial = ({acc, onAddContact, onAddActivity, isMobile}) => {
  const [open, setOpen] = useState(false);
  const bottom = isMobile ? 76 : 24;
  if(!isMobile) return(
    <div style={{position:'fixed',right:20,bottom:bottom,zIndex:200}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:8}}>
        {open && <>
          <div style={{display:'flex',alignItems:'center',gap:8,animation:'fadeUp .15s ease'}}>
            <span style={{fontSize:12,fontWeight:600,color:'var(--ink-mid)',background:'white',padding:'4px 10px',borderRadius:20,boxShadow:'var(--sh-s)',whiteSpace:'nowrap'}}>Add Contact</span>
            <button onClick={()=>{setOpen(false);onAddContact();}} style={{width:40,height:40,borderRadius:'50%',background:'white',border:'2px solid var(--border)',color:'var(--ink)',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'var(--sh-s)'}}>👤</button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,animation:'fadeUp .18s ease'}}>
            <span style={{fontSize:12,fontWeight:600,color:'var(--ink-mid)',background:'white',padding:'4px 10px',borderRadius:20,boxShadow:'var(--sh-s)',whiteSpace:'nowrap'}}>Log Activity</span>
            <button onClick={()=>{setOpen(false);onAddActivity();}} style={{width:40,height:40,borderRadius:'50%',background:'white',border:'2px solid var(--border)',color:'var(--ink)',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'var(--sh-s)'}}>✍️</button>
          </div>
        </>}
        <button onClick={()=>setOpen(p=>!p)} style={{width:52,height:52,borderRadius:'50%',background:acc,border:'none',color:'white',fontSize:24,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 20px rgba(0,0,0,.22)',transform:open?'rotate(45deg)':'none',transition:'transform .2s ease'}}>+</button>
      </div>
      {open && <div onClick={()=>setOpen(false)} style={{position:'fixed',inset:0,zIndex:-1}}/>}
    </div>
  );
  return(
    <div style={{position:'fixed',right:16,bottom:bottom,zIndex:200}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:10}}>
        {open && <>
          <div style={{display:'flex',alignItems:'center',gap:8,animation:'slideUp .15s ease'}}>
            <span style={{fontSize:11.5,fontWeight:600,color:'var(--ink-mid)',background:'white',padding:'5px 11px',borderRadius:20,boxShadow:'var(--sh-s)',whiteSpace:'nowrap'}}>Add Contact</span>
            <button onClick={()=>{setOpen(false);onAddContact();}} style={{width:44,height:44,borderRadius:'50%',background:'white',border:'none',color:'var(--ink)',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 16px rgba(0,0,0,.18)'}}>👤</button>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,animation:'slideUp .18s ease'}}>
            <span style={{fontSize:11.5,fontWeight:600,color:'var(--ink-mid)',background:'white',padding:'5px 11px',borderRadius:20,boxShadow:'var(--sh-s)',whiteSpace:'nowrap'}}>Log Activity</span>
            <button onClick={()=>{setOpen(false);onAddActivity();}} style={{width:44,height:44,borderRadius:'50%',background:'white',border:'none',color:'var(--ink)',fontSize:20,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 16px rgba(0,0,0,.18)'}}>✍️</button>
          </div>
        </>}
        <button onClick={()=>setOpen(p=>!p)} style={{width:52,height:52,borderRadius:'50%',background:acc,border:'none',color:'white',fontSize:26,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 20px rgba(0,0,0,.24)',transform:open?'rotate(45deg)':'none',transition:'transform .22s ease',lineHeight:1}}>+</button>
      </div>
      {open && <div onClick={()=>setOpen(false)} style={{position:'fixed',inset:0,zIndex:-1}}/>}
    </div>
  );
};

/* ── HOME / WEEKLY DIGEST VIEW ─── */
const HomeView = ({contacts, onSelect, onNav, acc, isMobile}) => {
  const hr = new Date().getHours();
  const greet = hr<5?'Night owl 🦉':hr<12?'Good morning ☀️':hr<17?'Good afternoon 🌤':hr<21?'Good evening 🌙':'Good night 🌙';
  const birthdays = contacts.filter(c=>c.birthday&&birthdayDaysAway(c.birthday)!==null&&birthdayDaysAway(c.birthday)<=7).sort((a,b)=>birthdayDaysAway(a.birthday)-birthdayDaysAway(b.birthday));
  const overdue = contacts.filter(isDue).sort((a,b)=>new Date(a.nextFollowUp)-new Date(b.nextFollowUp));
  const overdueIds = new Set(overdue.map(x=>x.id));
  const cold = contacts.filter(c=>!overdueIds.has(c.id)&&c.strength<0.3&&c.lastContact&&Math.floor((TODAY-new Date(c.lastContact))/864e5)>45).sort((a,b)=>a.strength-b.strength);
  const thriving = contacts.filter(c=>c.strength>=0.8).length;
  const allGood = overdue.length===0&&birthdays.length===0&&cold.length===0;
  const SectionWrap = ({title,accent,onMore,children}) => (
    <div style={{marginBottom:22}}>
      <div style={{fontSize:12,fontWeight:700,textTransform:'uppercase',letterSpacing:'.07em',color:accent||'var(--ink-light)',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{whiteSpace:'nowrap'}}>{title}</span>
        {onMore&&<span onClick={onMore} style={{fontSize:12,fontWeight:600,color:acc,cursor:'pointer'}}>See all →</span>}
      </div>
      <div style={{background:'white',borderRadius:12,overflow:'hidden',border:'1px solid var(--border)',boxShadow:'var(--sh-s)'}}>{children}</div>
    </div>
  );
  const PersonRow = ({contact,right,isLast}) => (
    <div onClick={()=>onSelect(contact)} style={{display:'flex',alignItems:'center',gap:12,padding:'13px 16px',borderBottom:isLast?'none':'1px solid var(--border)',cursor:'pointer',transition:'background .13s'}}
      onMouseEnter={e=>e.currentTarget.style.background='var(--paper)'} onMouseLeave={e=>e.currentTarget.style.background='white'}>
      <Avi contact={contact} size={36} ring={false}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{contact.name}</div>
        <div style={{fontSize:12,color:'var(--ink-light)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{contact.role}{contact.company?' · '+contact.company:''}</div>
      </div>
      <div style={{flexShrink:0}}>{right}</div>
    </div>
  );
  return(
    <div style={{flex:1,overflow:'auto'}}>
      <div style={{padding:'28px 24px 22px',background:'var(--paper)',borderBottom:'1px solid var(--border)'}}>
        <div style={{fontFamily:"'Lora',serif",fontSize:isMobile?21:26,fontWeight:700,marginBottom:5}}>{greet}</div>
        <div style={{fontSize:13.5,color:'var(--ink-light)',fontStyle:'italic',fontFamily:"'Lora',serif"}}>Here's your week</div>
      </div>
      <div style={{padding:'22px 26px',maxWidth:820,margin:'0 auto'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginBottom:26}}>
          {[{label:'Total',value:contacts.length,bg:'white',color:'var(--ink)'},{label:'Overdue',value:overdue.length,bg:overdue.length?'#FDECEA':'#EAF3EC',color:overdue.length?'#C44F3A':'#5A8A6A'},{label:'Thriving',value:thriving,bg:'#EAF3EC',color:'#5A8A6A'}].map(s=>(
            <div key={s.label} style={{background:s.bg,borderRadius:10,padding:'14px 10px 12px',border:'1px solid var(--border)',textAlign:'center'}}>
              <div style={{fontSize:28,fontWeight:700,color:s.color,lineHeight:1,marginBottom:5,fontFamily:"'Lora',serif"}}>{s.value}</div>
              <div style={{fontSize:11,fontWeight:600,color:'var(--ink-light)',textTransform:'uppercase',letterSpacing:'.07em'}}>{s.label}</div>
            </div>
          ))}
        </div>
        {birthdays.length>0&&(
          <SectionWrap title="🎂 Birthdays this week" accent="#9B3F8A">
            {birthdays.map((c,i)=><PersonRow key={c.id} contact={c} isLast={i===birthdays.length-1} right={<span style={{fontSize:11,fontWeight:600,color:'#9B3F8A',background:'#FDF0FB',padding:'3px 8px',borderRadius:12,border:'1px solid #E8C4E0',whiteSpace:'nowrap'}}>{birthdayDaysAway(c.birthday)===0?'🎉 Today!':birthdayDaysAway(c.birthday)===1?'Tomorrow':'in '+birthdayDaysAway(c.birthday)+'d'}</span>}/>)}
          </SectionWrap>
        )}
        {overdue.length>0&&(
          <SectionWrap title="⏰ Follow-ups due" accent="#C44F3A" onMore={overdue.length>3?()=>onNav('reminders'):null}>
            {overdue.slice(0,3).map((c,i)=><PersonRow key={c.id} contact={c} isLast={i===Math.min(overdue.length,3)-1} right={<DueBadge contact={c}/>}/>)}
          </SectionWrap>
        )}
        {cold.length>0&&(
          <SectionWrap title="🌵 Going cold" accent="#C49B3A">
            {cold.slice(0,3).map((c,i)=><PersonRow key={c.id} contact={c} isLast={i===Math.min(cold.length,3)-1} right={<span style={{fontSize:11,color:'#C49B3A',fontWeight:600,background:'#FDF6E3',padding:'3px 8px',borderRadius:12,border:'1px solid #F0DFA0',whiteSpace:'nowrap'}}>{Math.floor((TODAY-new Date(c.lastContact))/864e5)+'d ago'}</span>}/>)}
          </SectionWrap>
        )}
        {allGood&&(
          <div style={{textAlign:'center',padding:'60px 20px',color:'var(--ink-light)'}}>
            <div style={{fontSize:44,marginBottom:16}}>🌸</div>
            <div style={{fontFamily:"'Lora',serif",fontSize:20,fontWeight:600,marginBottom:8,color:'var(--ink)'}}>All caught up</div>
            <div style={{fontSize:13.5,lineHeight:1.7,color:'var(--ink-light)',fontStyle:'italic',fontFamily:"'Lora',serif"}}>Your network is in good shape.</div>
          </div>
        )}
      </div>
    </div>
  );
};

/* ── MOBILE BOTTOM NAV ─── */
const BottomNav = ({view, onChange, contacts, acc}) => {
  const items = [
    {id:'home',icon:'❖',label:'Home'},
    {id:'contacts',icon:'◉',label:'Contacts'},
    {id:'reminders',icon:'◎',label:'Follow-ups',badge:contacts.filter(isDue).length},
    {id:'river',icon:'◈',label:'Activity'},
  ];
  return(
    <div style={{display:'flex',borderTop:'1px solid var(--border)',background:'var(--paper)',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom)'}}>
      {items.map(n=>(
        <div key={n.id} onClick={()=>onChange(n.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',padding:'8px 0 6px',cursor:'pointer',color:view===n.id?acc:'var(--ink-light)',transition:'color .14s',position:'relative'}}>
          <span style={{fontSize:18,lineHeight:1,marginBottom:3}}>{n.icon}</span>
          <span style={{fontSize:10,fontWeight:view===n.id?600:400}}>{n.label}</span>
          {n.badge>0 && <span style={{position:'absolute',top:5,right:'calc(50% - 15px)',width:16,height:16,borderRadius:'50%',background:'#C44F3A',color:'white',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center'}}>{n.badge}</span>}
        </div>
      ))}
    </div>
  );
};

/* ── APP ─── */
const App = () => {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [contacts, setContacts] = useState([]);
  const [dbStatus, setDbStatus] = useState('loading');
  const [setupDismissed, setSetupDismissed] = useState(false);
  const [selected, setSelected] = useState(null);
  const [nav, setNav] = useState('home');
  const [isMobile, setIsMobile] = useState(window.innerWidth < 700);
  const [showAddModal, setShowAddModal] = useState(false);
  const [showActivityModal, setShowActivityModal] = useState(false);

  // Load contacts from Supabase
  useEffect(() => { loadContacts(); }, []);
  const loadContacts = async () => {
    setDbStatus('loading');
    try {
      const { data, error } = await window.__sb
        .from('contacts')
        .select('*, interactions(*)')
        .order('created_at', { ascending: false });
      if (error) {
        setDbStatus(error.code === '42P01' ? 'setup' : 'offline');
        setContacts(CONTACTS);
        return;
      }
      setContacts(data.length > 0 ? data.map(dbToContact) : CONTACTS);
      setDbStatus('connected');
    } catch(e) {
      setDbStatus('offline');
      setContacts(CONTACTS);
    }
  };

  useEffect(()=>{
    const fn=()=>setIsMobile(window.innerWidth<700);
    window.addEventListener('resize',fn);
    return()=>window.removeEventListener('resize',fn);
  },[]);

  const theme = ACCENT_THEMES[t.accentColor] || ACCENT_THEMES['#D97757'];
  const acc = theme.acc;

  useEffect(()=>{
    document.documentElement.style.setProperty('--acc', acc);
    document.documentElement.style.setProperty('--acc-light', theme.accLight);
    document.documentElement.style.setProperty('--acc-pale', theme.accPale);
  },[acc, theme]);

  const handleLog = async (cid, data) => {
    const today = TODAY.toISOString().split('T')[0];
    const contact = contacts.find(c => c.id === cid);
    const newStrength = Math.min(1, (contact?.strength || 0.5) + .08);
    const updatedC = {...contact, interactions:[{...data,date:today},...(contact?.interactions||[])], lastContact:today, strength:newStrength};
    setContacts(prev => prev.map(c => c.id===cid ? updatedC : c));
    if (selected?.id === cid) setSelected(updatedC);
    if (dbStatus !== 'connected') return;
    try {
      await window.__sb.from('interactions').insert({contact_id:cid, date:today, type:data.type, note:data.note});
      await window.__sb.from('contacts').update({last_contact:today, strength:newStrength}).eq('id', cid);
    } catch(e) { console.warn('Log sync failed:', e); }
  };
  const handleSelect = c => { setSelected(c); if(c) setNav('contacts'); };
  const handleNav = v => { setNav(v); setSelected(null); };
  const handleAddContact = async c => {
    setContacts(prev => [c, ...prev]);
    if (dbStatus !== 'connected') return;
    try {
      const { data, error } = await window.__sb.from('contacts').insert(contactToDb(c)).select().single();
      if (error) throw error;
      if (c.interactions?.length) {
        await window.__sb.from('interactions').insert(
          c.interactions.map(i => ({contact_id:data.id, date:i.date, type:i.type, note:i.note}))
        );
      }
      setContacts(prev => prev.map(x => x.id === c.id ? {...x, id:data.id} : x));
    } catch(e) { console.warn('Save failed:', e); }
  };

  const renderMain = () => {
    if(nav==='home') return <HomeView contacts={contacts} onSelect={handleSelect} onNav={handleNav} acc={acc} isMobile={isMobile}/>;
    if(nav==='river') return <RiverView contacts={contacts} onSelect={handleSelect} acc={acc}/>;
    if(nav==='reminders') return <RemindersView contacts={contacts} onSelect={handleSelect} onLog={handleLog} acc={acc}/>;
    return <ContactsView contacts={contacts} selected={selected} onSelect={setSelected} viewMode={t.viewMode} acc={acc} onAddClick={()=>setShowAddModal(true)} dbStatus={setupDismissed?'connected':dbStatus} onDismissSetup={()=>setSetupDismissed(true)}/> ;
  };

  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh',overflow:'hidden'}}>
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {!isMobile && (
          <Sidebar view={nav} onChange={handleNav} contacts={contacts} onSelect={handleSelect} acc={acc} collapsed={t.sidebarCollapsed} dbStatus={dbStatus} onLogActivity={()=>setShowActivityModal(true)}/>
        )}
        <div style={{flex:1,display:'flex',overflow:'hidden'}}>
          <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>{renderMain()}</div>
          {selected && !isMobile && (
            <Detail contact={selected} onClose={()=>setSelected(null)} onLog={handleLog} acc={acc} isMobile={false}/>
          )}
        </div>
      </div>
      {!selected && !showAddModal && !showActivityModal && <SpeedDial acc={acc} onAddContact={()=>setShowAddModal(true)} onAddActivity={()=>setShowActivityModal(true)} isMobile={isMobile}/>}
      {isMobile && <BottomNav view={nav} onChange={handleNav} contacts={contacts} acc={acc}/>}
      {selected && isMobile && <Detail contact={selected} onClose={()=>setSelected(null)} onLog={handleLog} acc={acc} isMobile={true}/>}

      {showAddModal && <AddContactModal acc={acc} onClose={()=>setShowAddModal(false)} onSave={handleAddContact}/>}
      {showActivityModal && <AddActivityModal contacts={contacts} acc={acc} onClose={()=>setShowActivityModal(false)} onLog={handleLog}/>}
      <TweaksPanel>
        <TweakSection label="Accent color"/>
        <TweakColor label="Theme" value={t.accentColor} options={ACCENT_OPTIONS} onChange={v=>setTweak('accentColor',v)}/>
        <TweakSection label="Contact layout"/>
        <TweakRadio label="View mode" value={t.viewMode} options={['grid','list']} onChange={v=>setTweak('viewMode',v)}/>
        <TweakSection label="Sidebar"/>
        <TweakToggle label="Collapse sidebar" value={t.sidebarCollapsed} onChange={v=>setTweak('sidebarCollapsed',v)}/>
        <TweakSection label="Relationship rings"/>
        <TweakToggle label="Show rings on avatars" value={t.showStrengthRings} onChange={v=>setTweak('showStrengthRings',v)}/>
      </TweaksPanel>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
